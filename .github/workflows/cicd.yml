name: CI/CD MLflow to DockerHub

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn xgboost mlflow

      - name: Run MLflow Project
        run: |
          # Salin dataset ke dalam folder MLProject agar terbaca oleh skrip terisolasi
          cp telco_preprocessing/telco_processed.csv MLProject/
          # Jalankan MLflow dari folder MLProject
          mlflow run MLProject --env-manager=local

      - name: Get latest MLflow run_id
        run: |
          RUN_ID=$(ls -td mlruns/0/*/ | head -n 1 | cut -d'/' -f3)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest run_id: $RUN_ID"

      - name: Build Docker Image from MLflow Model
        run: |
          mlflow models build-docker --model-uri "runs:/$RUN_ID/model" --name "telco-churn-model"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Tag and Push Docker Image
        run: |
          docker tag telco-churn-model ${{ secrets.DOCKER_HUB_USERNAME }}/telco-churn:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/telco-churn:latest
